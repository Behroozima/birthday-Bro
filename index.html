<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Bro</title>

  <style>
    body{
      margin:0;
      background:#080312;
      color:white;
      font-family:tahoma;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .card{
      width:90%;
      max-width:700px;
      text-align:center;
      background:#12051f;
      border:2px solid #ff4fd8;
      border-radius:20px;
      padding:20px;
      box-shadow:0 0 30px #ff4fd8aa;
    }

    img{
      width:100%;
      border-radius:15px;
      margin-bottom:20px;
    }

    h1{
      color:#ff6be7;
      font-size:42px;
      margin-bottom:10px;
    }

    p{
      line-height:2;
      font-size:18px;
      color:#ffd9f7;
    }

    .small{
      margin-top:20px;
      opacity:.7;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="card">

    <img src="pony.png" alt="birthday">

    <h1>Happy Birthday Bro 🎉</h1>

    <p>
      می‌دونم قرار بود امروز با بقیه بچه‌ها بیام بیرون
      ولی نشد بیام :(
      <br><br>
      فقط خواستم بدونی واقعاً آدم مهم و باحالی‌ای هستی
      و امیدوارم امسال برات پر از حال خوب،
      خنده و اتفاقای خفن باشه ✨
    </p>

    <div class="small">
      stay awesome :)
    </div>

  </div>

</body>
</html>
